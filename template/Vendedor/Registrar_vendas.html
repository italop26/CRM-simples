{%load static%}
<!DOCTYPE html>
<html lang="pt br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar vendas</title>
    <link rel="stylesheet" href="{% static 'css/estilos.css'%}">
</head>
<body>
        <h1>Registrar Venda</h1>
        <div class="container">
                <div class="grupo-card">
                        {% for p in produto %}
       
                        <p>{{ p.nome_produto }}</p>
                        <p>{{ p.estoque }}</p>

       

                <form action="{% url 'registrar vendas' p.id %}"  method="POST">
                         {% csrf_token %}
                 <button type="submit">Registrar Vendas</button>
                </form>
            
                        {%endfor%}
                </div>
        </div>
</body>
</html>
