{%load static%}
<!DOCTYPE html>
<html lang="pt br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atualizar estoque</title>
    <link rel="stylesheet" href="{% static 'css/estilos.css' %}">
</head>
<body>
  <h1>Atualizar Estoque</h1>

    <div class="container">
        <p><strong>Produto:</strong> {{ produto.nome_produto }}</p>
        <p><strong>Estoque atual:</strong> {{ produto.estoque }}</p>

        <form action="{% url 'atualizar_estoque' produto.id %}" method="POST">
            {% csrf_token %}
            <div class="grupo-card">
        <label for="estoque">Quantidade para adicionar:</label>
        <input
        type="number"
        id="estoque"
        name="estoque"
        min="1"
        required
        placeholder="Digite a quantidade"
    >

        <button type="submit">
            Adicionar ao Estoque
        </button>
            </div>
        </div>
    </form> 

</body>
</html>
