{%load static%}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa</title>
    <link rel="stylesheet" href="{% static 'css/estilos.css' %}">
</head>
<body>
    <div class="container">
    <h1>Controle de Caixa</h1>

    <h2>Saldo do Dia: R$ {{ saldo }}</h2>

    <hr>

    <h3>Entrada</h3>

    <form method="POST">
        {% csrf_token %}

        <input type="hidden" name="tipo" value="entrada">

        <label>Valor:</label>
        <input type="number" step="0.01" name="valor" required>

        <button type="submit">
            Registrar Entrada
        </button>
    </form>

    <hr>

    <h3>Retirada</h3>

    <form method="POST">
        {% csrf_token %}

        <input type="hidden" name="tipo" value="retirada">

        <label>Valor:</label>
        <input type="number" step="0.01" name="valor" required>

        <button type="submit">
            Registrar Retirada
        </button>
    </form>
    </div>

</body>
</html>
